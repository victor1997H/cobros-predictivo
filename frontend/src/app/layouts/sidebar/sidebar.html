<aside class="sidebar">
  <div class="brand">
    <div class="brand-icon">CP</div>

    <div>
      <h2>CobrosPredictivo</h2>
      <span>Gesti&oacute;n de Cobros</span>
    </div>
  </div>

  <nav class="menu">
    <a routerLink="/dashboard" routerLinkActive="active" class="menu-item">
      <span class="menu-icon">DB</span>
      Dashboard
    </a>

    <a routerLink="/clientes" routerLinkActive="active" class="menu-item">
      <span class="menu-icon">CL</span>
      Clientes
    </a>

    <a routerLink="/cobros" routerLinkActive="active" class="menu-item">
      <span class="menu-icon">CO</span>
      Cobros
    </a>

    <a routerLink="/pagos" routerLinkActive="active" class="menu-item">
      <span class="menu-icon">PA</span>

    </a>

    <a routerLink="/reportes" routerLinkActive="active" class="menu-item">
      <span class="menu-icon">RE</span>

      <div>
        <strong>{{ currentUser.nombre }}</strong>
        <span>{{ currentUser.email }}</span>

  <button class="sidebar-logout" type="button" (click)="logout()">

  <div class="sidebar-footer">Versi&oacute;n 1.0.0</div>
